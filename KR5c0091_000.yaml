  text: 老子短一
  hash: sha256:68c7c73ca8aa0cb0d08244a4c1667aa54c262a8d00f174e204c3d0630316b500
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0091_HFL_000-001a, image: hfl/0392/0392-004.png}
body:
  text: 臨川吳澄述老子李氏名耳字聃史記列傳曰字伯陽楚苦縣厲鄉曲仁里人周守藏室之史也修道德以自隱無名為務居周久之見周之衰遂去至關關令尹喜曰子將隱矣強為我著書於是乃著上下篇五千餘言而去莫知其終莊子曰以本為精以末為粗以有積為不足淡然獨與神明居建之以常無有主之以太一以懦弱謙下為表以空虛不毁萬物為實人皆求福己獨曲全以深為根以約為紀常寬容於物不削於人古之博大真人哉苦音怙藏去聲強為上其兩切下云偽切
  hash: sha256:054769eb9ed0e9f76092db5df8deb4bb05febfe227d4b7d82fa386ff9528e24e
