body:
  text: 道徳真經註卷四元吴澄撰徳經下治大國若烹小鮮小鮮小魚也國大則民衆治大國當以簡静不可擾動其民如烹小魚唯恐其壞爛而不敢擾動之也以道莅天下者其鬼不神莅臨也鬼天地之氣神靈怪也人之氣與天地之氣通為一有道之主以道臨莅天下簡静而不擾其民故民氣和平充塞兩間相為感應而天地之氣無或戾故鬼不為靈怪興妖災也非其鬼不神其神不傷人非其神不傷人聖人亦不傷之鬼所以不靈怪者非不靈怪雖能靈怪而不為妖災傷害人也所以不傷害人者非自能如此也以聖人能使民氣和平不傷害天地之氣天地之氣亦和平而不傷害人也曰鬼曰神皆天地之氣名二而實一也夫兩不相傷故徳交歸焉交皆也天地之氣不傷害人者以聖人不傷害天地之氣也聖人不傷害天地之氣者以其簡静而民氣和平也兩者不相傷皆由於聖人之徳故皆歸徳於聖人也右第五十一章大國者下流天下之交交㑹也大國者諸小國之交㑹如水之下流為天下衆水之交㑹也天下之牝牝常以静勝牡以静為下牝不先動以求牡牡常先動以求牝動求者招損静俟者受益故曰以静勝牡動求者居上静俟者居下故曰以静為下或曰牝字其一疑衍故大國以下小國則取小國小國以下大國則取大國或下以取或下而取大國不恃其尊謙降以下小國則能致小國之樂附小國甘處於卑俯伏以下大國則能得大國之見容下以取謂大國能下以取小國之附下而取謂小國能下而取大國之容也大國不過欲兼畜人小國不過欲入事人兩者各得其所欲大者宜為下大國下小國者欲兼畜小國而已小國下大國者欲入事大國而已兩者皆能下則大小各得其所欲然小者素在人下不患乎不能下大者非在人下或恐其不能下故曰大者宜為下章首下流之喻以喻大國非在人下而能下者牝牡之喻以喻小國素在人下而能下者右第五十二章道者萬物之奥善人之寳不善人之所保萬物之奥萬物之最貴者奥室之西南隅寢廟之制有堂有室室在内故室為貴室中之制東南隅曰穾東北隅曰宧西北隅曰屋漏奥尊者所居故奥為貴道之尊貴猶寢廟堂室之奥寳人所重善人向道而進脩可以取重於人不善人闕悔亦可以自保其身穾音杳䆠音頥美言可以市尊行可以加人申言善人之寳善人以道取重於人嘉言可愛如美物之可以鬻賣卓行可宗髙出衆人之上人之不善何棄之有申言不善人所保不善人以道保身者畏威寡罪身獲全安是不善之人道亦何嘗棄之也故立天子置三公雖有拱璧以先駟馬不如坐進此道申言道者萬物之奥有道之人天命之以君師之位則立之為天子君命之以師傅之職則置之為三公皆以有道而貴也拱璧合拱之璧駟馬一乘之馬拱璧先駟馬猶春秋傳言乗韋先十二牛也坐跪也朝聘之享駟馬陳於外執拱璧以將命曰先朝聘以拱璧駟馬為至貴而未足貴也不如跪而進此道之尤貴天子三公之貴以此道拱璧駟馬不如此道故萬物貴之而以為奥也古之所以貴此道者何也不曰求以得有罪以免邪故為天下貴又總上三節而言貴此道言萬物之奥求以得言善人之寳罪以免言不善人所保自古所以貴此道者何也豈不曰善人以此道為人所寳得遂所求邪不善人以此道保其身免䧟於罪邪道所以為天下貴也天下釋萬物貴字釋奥右第五十三章為無為事無事味無味凡以無為而為者老氏宗㫖也身行之事以無事為事口食之味以無味為味皆演為無為一句之旨圖難於其易為大於其細天下難事必作於易天下大事必作於細作起也所以得遂其無為者能圖其難於易之時為其大於細之時也天下之事始易而終難始細而終大終之難起於始之易終之大起於始之細故圗之為之於其易細之始則其終可不至於難可馴至於大而不勞心勞力所以能無為也若不早圗之急為之於其始則其終也易者漸難細者不大心力俱困無為其可得乎其安易持其未兆易謀其脆易泮其微易散為之於未有治之於末亂此言圗之於其易合抱之木生於毫末九層之臺起於累土千里之行始於足下此言為之於其細夫輕諾必寡信多易必多難是以聖人猶難之故終無難上言事之難易此言心之難易始焉輕易諾人者其終難於踐言則寡信矣始之多易者終必多難故不待至終難之時而心以為難雖始易之時而心猶難之始終皆不敢易所以終無難大小多少報怨以徳是以聖人終不為大故能成其大上言事之大小此言心之大小雖已大而心常自小已多而心常自少雖有怨當報然不自恃其大且多而急求伸直欲報其怨亦惟自處於小與少而甘受屈辱姑報以徳也蓋始小而少之時心固不敢自以為大即大而多之時則心亦不敢自以為大始終皆能自小所以能成其大也民之從事常於幾成而敗之慎終如始則無敗事矣又承上文終無難與終不為大二終字而言始雖以為難至終而不以為難始雖不敢以為大至終而自以為大則事幾成而敗於終者有矣故必慎終如始始以為難而終亦以為難始不為大而終亦不為大則終無敗事也為者敗之執者失之無為故無敗無執故無失又承上㡬成而敗與無敗事二敗字而言有心於為其事者意欲求其成而或反敗之有心於執其物者意欲保其得而或反失之無所為則無成與敗矣無所執則無得與失矣是以聖人欲不欲不貴難得之貨學不學復衆人之所過以輔萬物之自然而不敢為上言為者不若無為執者不若無執此言聖人之欲以不欲為欲聖人之學以不學為學難得之貨人所欲者不貴重之是不欲人之所欲也故曰欲不欲衆人所趨者我亦不趨衆人掉臂過而不顧我則還反其處是不學人之所學也故曰學不學凡此不欲不學者盖以萬物之理無為而自然故吾亦無為而與萬物同一自然而輔之於輪輻相依附而為一也章首言為無為章末言自然而不敢為此一章之意相始終右第五十四章古之善為道者非以明民將以愚之有所知為明無所知為愚古者聖人明已之徳以明民徳亦欲民之愚者進於明而有所知也惟其愚而不能使之知非不欲其明而固欲其愚也老子生於衰世見上古無為而治其民淳樸而無知後世有為而治其民澆偽而有知善為道者化民為淳樸非欲使之明但欲使之愚而已此憤世矯枉之論其流之弊則為秦之燔經書以愚黔首民之難治以其智多故以智治國國之賊不以智治國國之福民之所以難治者以其明智之多是以法出姦生令下詐起以智治國謂聰明睿知以有臨使其民亦化而明智則機巧慧而難治以智治國者國之賊害也不以智治國謂自晦其明以莅衆使其民亦化而愚昧則倥侗顓䝉而易治不以智治國者國之福利也知此兩者亦楷式兩者以智與不以智也楷者以為模楷效法之也式自處於卑也乗車者直躬憑較則為自處於髙上俯首憑式則為自處於卑下不自處以智而自處以愚者不髙上而自卑下也能知楷式是謂𤣥徳𤣥徳深矣逺矣與物反矣廼至於大順能知效法自處卑下之聖人則為𤣥妙之徳𤣥妙之徳深逺而不淺近故人不可測如人皆欲智我獨欲愚是與物相反也相反相逆也不相反相順也與物相順而不足以為順相逆雖不順廼所以為順之大故為𤣥妙深逺不可測之徳也右第五十五章江海所以能為百谷王者以其善下之也故能為百谷王百谷之水同歸江海如天下之人同歸一王也江海之委在水下流能下衆水故能兼受百谷之水為之王也王之所以能兼有天下之人者亦若是是以聖人欲上人以其言下之欲先人以其身後之言下之卑屈其言而不尊髙身後之退却其身而不前進此聖人謙譲盛徳非有心於上人先人為之讀者不以辭害意可也是以處上而人不重處前而人不害重難也害患也聖人能下之後之處人之上人不以為難處人之前人不以為患是以天下樂推而不厭以其不争故天下莫能與之争天下樂於推戴使之處上處前而不厭惡盖以其卑抑退遜不争處上處前故天下之人莫能與之争上争先者而聖人得位得時竟得以上人先人也董氏曰徳下之則形上矣徳後之則形先矣楊雄云自下者人髙之自後者人先之右第五十六章天下皆謂我道大似不肖夫惟大故似不肖若肖久矣其細不肖無所肖似疑若一無所能道大似不肖猶逹巷黨人言孔子大而無一善之成名也蓋惟大而不可名故無可稱而似不肖董氏曰有所肖似則同於一物何足以為大夫我有三寳寳而持之一曰慈二曰儉三曰不敢為天下先持守而不失慈柔弱哀閔而不剛强儉寡小節約而不侈肆不敢先謙讓退郤而不鋭進持此三寳故雖大而似不肖也夫慈故能勇儉故能廣不敢為天下先故能成器長今舎慈且勇舎儉且廣舎後且先死矣慈者似怯而不勇廼所以為勇儉者似狹而不廣廼所以能廣器有形之物長為之上也不敢先者居人後而不為長然自後者人先之廼所以首出庶物之上而為器之長也舎而不用慈儉退後之寳而剛强以為勇侈肆以為廣銳進以求為先則將不能保其生皆死之徒也夫慈以戰則勝以守則固天將救之以慈衛之慈者生之道仁之徳為三寳之首此下專言慈之一寳而二寳在其中矣慈者人人親之如父母豈有子而敵其父母攻其父母者哉故以慈而戰守則人不忍敵攻是能勝能固也縱有來敵來攻之寇人助其父母者多亦必能勝能固或人力不逮天亦將救助之不令其敗且潰天所以救助之者以其能慈而衞䕶之也曹操苻堅吞噬無厭不慈之甚呉晉雖非能如聖人之慈其禦寇也不得已而應之比之曹苻則此善於彼亦近於慈者赤壁風火勢順而北船燬青岡風鶴聲聞而氐衆奔吳晉雖弱挫曹苻百萬之兵是亦天救之也善為士者不武善戰者不怒善勝敵者不與善用人者為之下是謂不争之徳是謂用人之力是謂配天古之極申言慈之寳四句四善字三句言用兵一句言用人也古者車戰為士甲士三人在車上左執弓右持矛中御車掌旗鼓皆欲其强武戰卒七十二人在車下將戰必激發其衆欲其奮怒然後能與敵争雄而取勝慈者之用兵則不以此為善也士不欲其强武戰不欲其奮怒勝敵不待與之對陣較力兵刃不施彼將自屈吾之智能雖在人上歉然若不智已雖有能退然若不能自處於其下用他人之智為智用他人之能為能不武不怒不與為敵而自勝者以不争為徳如天之不争而勝也為之下者不恃智能而用人之力成已之事如天之無為而成故曰配天惟上古聖神之至極者能如此故曰古之極用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂執無兵仍無敵又申言慈之寳不敢字言用兵用兵有言者用兵者嘗有是言為主肇兵端以伐人也為客不得已而應敵也進寸難進也退尺易退也仍就也不為首兵但為應兵雖為應兵亦不欲戰不敢近進寜於逺退進戰者整其行陣而行攘臂以執兵而前進以仍敵不行則雖有行如無行不攘則雖有臂如無臂不執則雖有兵如無兵不仍之則雖有敵在前如無敵也無行音杭禍莫大於輕敵輕敵幾喪吾寳故抗兵相加哀者勝矣行三軍臨事而懼不敢輕敵也輕敵則輕戰以至殺人而喪吾慈寳矣禍莫大焉雖未進戰然一有輕敵之心則已有殺人喪寳之漸故曰幾喪吾寳抗舉也哀者慈心之見蘇氏曰兩敵舉兵相加而吾出於不得已則有哀閔殺傷之心哀心見而天人助之勝矣蓋慈者之勝不慈非戰而敗之不戰而屈之即勝也右第五十七章吾言甚易知甚易行天下莫能知莫能行老子教人柔弱謙下而已其言甚易知其事甚易行也世降俗末天下之人莫能知其言之可貴莫能行柔弱謙下之事者言有宗事有君夫惟無知是以不我知宗貴於族而統一族君貴於國而主一國柔弱謙下可以為衆言之統如族之有宗可以為諸事之主如國之有君老子嘆時人愚而無知是以不知我言之可貴也知我者希則我貴矣是以聖人被褐懐玉既已嘆之又若幸之非幸之也深惜之爾謂知我言之可貴者少此我之言所以為貴若使人人能知我之言則我與衆同不足貴矣褐毛布賤者所服人不知聖人但見其外之所被如褐而不之貴不知其中之所懷如玉而可貴也右第五十八章知不知上不知知病知而若不知上智之人聰明睿知守之以愚故曰上不知而以所知下愚之人耳目聾瞽自謂有所聞見故曰病夫惟病病是以不病病病猶患其所患以不知為知病也以為病而病之則不復有此病矣聖人不病以其病病是以不病聖人生而知之雖知猶若不知豈有不知為知之病乎其不病也自然而然非由病病而然也聖人不恃其生知已雖無病可病然見不賢而内自省於衆人有病之可病者亦惕然以為病而病之以其病人之病若已之病是以自已始終不病也右第五十九章民不畏威大威至矣威可畏者損夀戕身之事大威大可畏者死也人不畏其所可畏必戕身損壽以速其死有大可畏者至矣莊子曰人之所取畏者衽席之上飲食之間而不知為之戒者過也無狎其所居無厭其所生無毋通禁止辭狎玩習所居身之所處厭猶惡而棄之也平日所處凡損壽戕身之事無所畏憚狎習為常安然為之言不畏威也厭所生謂傷生速死是厭惡其所生而棄其命大威至矣夫惟不狎是以不厭不狎舊本作不厭廬陵劉氏云上句不厭當作不狎今從之夫惟不狎其所居而畏所畏是以不厭其所生而大可畏者不至矣是以聖人自知不自見自愛不自貴故去彼取此自知自知愛身之道自見自顯著所知以示人自貴即後章貴生言貪生之心太重也聖人於自愛之道雖自知於中然含徳襲明知若不知亦不表表示人自見於外雖自愛之篤然體道自然若無以生為亦不切切貪生自貴之過彼謂自見自貴此謂自知自愛上文言不畏則有大威之禍不狎則有不厭之福皆為衆人言爾若聖人則不待畏而自無可畏不待毋狎而自無所狎内有自知自愛之實外無自見自貴之迹所無者所去也所有者所取也右第六十章勇於敢則殺勇於不敢則治此兩者或利或害此言用刑力之過人者勇也敢敢為惡不敢不敢為惡設言二人皆麗於法其一勇於敢者敢為惡之心過於人蓋怙終故犯之人也則當殺之虞典以為賊刑周語以為非𤯝惟終廼不可殺是也其一勇於不敢者不敢為惡之心過於人蓋𤯝灾誤犯之人也則當活之虞典謂𤯝灾肆赦周語謂非終惟𤯝時乃不可殺是也刑故宥過兩者帝王之刑老子之意則又不然言此兩者一利一害利謂勇於不敢而活之者為宜害謂勇於敢而殺之者恐或誤殺也然則不敢者固宜活之敢者亦不宜殺之也天之所惡孰知其故是以聖人猶難之敢為惡之人乃天所惡然天之所惡茫昧難測何以知其果為天所惡之人乎其人雖可殺聖人猶有難之之意而不敢輕易殺之也天之道不争而善勝不言而善應不召而自來坦然而善謀天恢恢疏而不失聖人不輕易殺之則為惡者皆得漏而天不漏也天之於惡人非如人之以力與争而天定自能勝人非如人之以口與言而其應如響應聲其報應之不待召之而自來至惡有惡報雖用智計不可逃免天雖無心坦然平易而巧於報應有非人謀之所能及此天恢恢廣大似若疏而不宻然未嘗失一惡人無得漏者聖人雖不殺之而天自殺之也民不畏死奈何以死懼之若使民常畏死而為竒者吾得執而殺之孰敢竒不正也使愚民常有畏死之心而竒邪為惡者吾得執而殺之則人人知畏孰敢為惡然雖殺惡人而人之敢為惡者不止則是民愚不知畏死雖為惡者必遭刑殺彼亦無所懼上之人奈何以死懼之而輕易殺人乎常有司殺者夫代司殺者殺是謂代大匠斵夫代大匠斵希有不傷手矣不以死懼其人為惡者可不殺乎曰有司殺者在司殺者天也惟天為能殺人惟大匠為能斵木人欲代天殺人猶代匠斵木也代斵者手必多傷以譬代殺者身必多害也蓋不有人禍必有天刑右第六十一章凡五節一節言用刑正例不可盡從蓋哀閔過厚之意二節言天之不可知而不輕殺三節言天之能為人殺者以示四節言民不可懼而不輕殺五節言人欲代天殺者以示戒大哉老子之慈乎民之饑以其上食税之多是以饑食謂君所食於民者税則民之所出以供上之食者也上多取於民則民饑且貧矣民之難治以其上之有為是以難治上有為以智術御其下下亦以姦詐欺其上故難治也人之輕死以其生生之厚是以輕死夫惟無以生為者是賢於貴生也輕易也生生之厚求生之心太重也賢猶勝也貴生貴重其生即生生之厚求生之心重保養太過將欲不死而適以易死至人非不愛生順其自然無所容心若無以生為者然外其身而身存賢於重用其心以貴生而反易死也右第六十二章人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁人生則肌膚柔軟而活動可以屈伸死則冷硬而强直不能屈伸草木生則枝莖軟脆死則枯槁堅硬因言人而并及於草木故堅强者死之徒柔弱者生之徒上文言人與草木生柔而死堅推此物理則知人之徳行凡堅强者不得其死是死之徒也柔弱者善保其生是生之徒也是以兵强則不勝木强則共用兵示弱者謀深而工敵輕而玩之故勝恃强者慮淺而驕敵懼而備之故不勝兵法始如處女敵人開户示之弱也後如脱兎敵不及距則能勝之矣秦兵過周超乗三百竟敗於殽齊兵入晉桀石投人竟敗於鞌此恃强不勝之驗也共兩手所圍也木之弱而搖動者為近末之小枝強而不搖動者則為近根合拱之大榦也因言兵而并及於木故堅强處下柔弱處上上文言兵强者為人所勝是處下也不能如勝人者之處上木强者近根之榦是處下也不得如小枝之處上推此物理則知人之徳行凡堅强者矜已人必蹷其貴髙而反處人下矣柔弱者衆所尊戴而得處人上矣右第六十三章天之道其猶張弓乎髙者抑之下者舉之有餘者損之不足者補之抑之舉之二句言張弓有餘不足二句言天道凡弛弓俯其體則弣在上弰向下張之而仰其體則弣向下弰在上是抑弣之髙者使之向下舉弰之下者使之在上天道之損有餘如抑其弣而使之下其補不足如舉其弰而使之髙天之道損有餘而補不足人之道則不然損不足以奉有餘天道虧盈而益謙人則并寡以益其多吞小以益其大取貧以益其富此所以逆天道也孰能以有餘奉天下惟有道者有道之君貴為天子富有四海而不自有其貴富菲飲食惡衣服卑宫室為天下惜財而不茍費制田里敎樹藝薄税斂使民家給人足是以巳之有餘而奉天下也是以聖人為而不恃功成而不居其不欲見賢邪聖人之功能蓋天下此有餘者也不恃其所為之能而若無能不居其所成之功而若無功不欲顯示其功能之賢於人皆損巳之有餘也右第六十四章天下柔弱莫過於水而攻堅强者莫之能先以其無以易之也金石至堅强然磨金石皆須用水是水為攻堅强之第一物莫有能先之者雖欲以他物易之而無可易之者也柔之勝剛弱之勝强天下莫不知而莫能行水為至柔弱之物而能攻至堅剛之金石此柔弱能勝剛强天下之人莫不知之而莫有能行柔弱之事者蓋歎之也是以聖人云受國之垢是謂社稷主受國之不祥是謂天下王垢污穢也不祥不吉善也污穢不吉善人所耻賤以為卑辱聖人則不然雖一國以汚穢不吉善之名歸之已皆受之而不辭蓋能柔弱甘以卑辱自處非如剛强之人欲以尊榮上人也然神所歆享而可以主社稷民所嚮往而可以王天下剛强者神怒民叛而失國失天下柔弱者神祐民附有國有天下此柔弱勝剛强之效也正言若反老子以反為道之動徳之𤣥故雖正言之每若反於正正而若反亦如明而若昧進而若退直而若屈巧而若拙之𩔖蓋若昧乃所以為明若退乃所以為進若屈乃所以為直若拙乃所以為巧若反乃所以為正下文言和怨者正欲救助善人而反不足以為之此正言若反也舊本以此為上章末句今按上章聖人云四句作結語意已完不應又綴一句于末他章並無此格絶學無憂章希言自然章皆以四字居首為一章之綱下乃詳言之此章亦然又反怨善三字叶韻故知此一句當為起語也和大怨必有餘怨安可以為善和平之也怨有所憤恨於人大怨其怨深至餘怨其怨藏宿於中而不盡為如夫子為衞君乎之為猶言救助之也善善人也怨者兩相仇必和而後解兩善人自無怨而何待於和兩惡人有怨則惡貫滿盈而自相殘或一勝一負或俱兩傷敗旁人静觀之可也惟善人不幸與惡人有怨善人平恕雖無仇惡人之心惡人忿狠必有仇善人之事惡人報怨則善人受害矣故有心救助善人者必須和其怨使之解仇釋憾意欲為善人也然阻遏惡人報怨之心使不得逞中有藏宿不盡之怨暫和於今暴發於後是今日之和怨不能已其他日之報怨也而安可以為善人乎是以聖人執左契而不責於人執左契不責於人無心待物也契者刻木為劵中分之各執其一而合之以表信取財物於人曰責契有左右左契在主財物者之所右契以付來取財物之人臨川王氏曰史記云操右契以責事禮記云獻田宅者操右契則知左契為受責者之所執證謂執左契者已不責於人待人來責於已有持右契來合者即與之無心計較其人之善否和怨者有心於為善人也不若無心待物如執左契而不責於人静中觀物而任其自然也有徳司契無徳司徹有徳無心待物無徳有心待物徹通也古者助法一井之田分為九區八家各受私田一區其中一區為公田八家同耕公田而各耕私田私田百畝所收或食九人或食八人或食七人或食六人下食五人由其各家丁力多寡强弱不同故也周改助為徹法恐八家私田所收之不均故八家私田亦令通力合作而均收之八家所得均平而無多寡之異司左契者任人來取無心計較其人故曰有徳司徹法者患其不均有心計較故曰無徳和怨者恐善人受害有心為之亦如司徹者有心於為力弱之家恐其所得者寡矣天道無親常與善人與猶為也聖人無心待物不遏惡人之報怨忍坐視善人之受害乎曰天道無所私親常救助善人聖人雖無心於為善人而天常為之必不令惡人得以肆毒也前言聖人不用刑而天殺惡人此言聖人不和怨而天為善人老子之道無為自然一付之天而已然天之殱惡祐善豈若人之有心哉惡者必禍善者必福理之自然而然爾右第六十六章小國寡民使民有什伯之器而不用使民重死而不逺徙十人為什百人為伯什伯之器重大之器衆所共也不用者不營為不貪求則重大之器無所用也重死者視死為重事而愛養其生不逺徙者生於此死於此不他適也老子欲挽衰周復還太古國大則民衆難治得小國寡民而治之使其民毋慕于外自足於内如此也雖有舟輿無所乗之雖有甲兵無所陳之舟輿甲兵非一人所可獨用謂什伯之器也無所乗無所陳不用也無所往則無用乎舟輿無所争則無用乎甲兵使民復結繩而用之民淳事簡上古結繩之治可復雖有書契亦可不用不但不用什伯之器而已甘其食美其服安其居樂其俗此言重死而不逺徙也以所食之食為甘以所服之服為美充然自足愛養其生言重死也以此身之居為安而安之以此地之俗為樂而樂之言不逺徙也惟老死於所生之處孰肯輕易逺徙哉鄰國相望雞犬之聲相聞使民至老死不相徃來此言民皆懐土雖相鄰之國目可以相望雞犬之聲耳可以相聞如此至近至老死不相往來不但不逺徙而已右第六十七章信言不美美言不信善者不辨辨者不善知者不博博者不知言之實者不飾美言之美者必虚飾而非實寔有能者口不好辨好辨以誇者非實能其事也實有知者學不務博務博以廣者非實知其理也此書卒章其言如此則其書和平簡約不辨不博蓋實善實知故皆真實之言而不虚飾以為美也聖人不積既以為人已愈有既以與人已愈多不積謂虚而無有為人以所善言與人以所知言虚而無有故所應不窮以積為有則所應有限豈能愈有愈多也哉莊子曰以有積為不足無蔵也故有餘天之道利而不害聖人之道為而不争利者害之對有利則必有害天之道雖利而不害以不利而利之是以不害為者争之端有為則必有争聖人之道雖為而不争以不為而為之是以不争也右第六十八章總結二篇以見五千言之意皆不出此道徳真經註卷四
