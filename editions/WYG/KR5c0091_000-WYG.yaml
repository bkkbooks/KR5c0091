body:
  text: 道徳真經註道家𩔖提要臣等謹案道徳真經註四卷元吳澄撰澄有易纂言已著録據澄年譜稱大徳十一年澄辭疾歸自京南下留清都觀與門人論及老莊太元等書因為正厥訛譌而著其説澄學出象山以尊徳性為本故此注所言與蘇轍指意畧同雖不免援儒入墨而就彼法言之則較諸方士之所註精䆳多矣篇末有澄䟦云莊君平所傳章七十二諸家所傳章八十一然有不當分而分者定為六十八章上篇三十二章三千三百六十六字下篇三十六章二千九百二十六字凡五千二百九十三字然大抵以意為之不必於古有所考蓋澄好竄改古經故於是書亦多所更定殆習慣成自然云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9ba70a5d90dc65e8205f251f5c21c0ada0450f53886324601f7924cdc66760d2
