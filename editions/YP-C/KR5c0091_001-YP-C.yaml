  text: 重刋道藏輯要心集十道德眞經註卷之一
  hash: sha256:645049f6da0a90c6815156e7f5e751e14e3abf344de1314012a4f20b96da6a8e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0091_YP-C_05xinji-10-0001a, image: JY053/05xinji-10-0001a.png}
body:
  text: 臨川吳澄述道經上上篇之首句曰道可道故以道字名篇尊之而曰經他本或作道德經上則是以道德經爲一書之總名而分上下篇也道可道非常道名可名非常名道猶路也可道可踐行也常常久不變也名謂德也可名可指定也道本無名字之曰道而已若謂如道路之可踐行而道則非此常而不變之道也德雖有名强爲之名而已若謂如名物之可指定而名則非此常而不變之德也可道去聲而道同强其兩切無名天地之始有名萬物之母無名者道也天地亦由此道而生故謂之始有名者德也萬物皆由此德而生故謂之母常無欲以觀其妙常有欲以觀其徼常卽常道常名之常常無欲謂聖人之性寂然而靜者此道之全體所在也而於此可以觀德之妙其指德言妙以道言妙者猶言至極之善常有欲謂聖人之情感物而動者此德之大用所行也而於此可以觀道之徼其指道言徼以德言徼者言猶邉際之處孟子所謂端是也徼古弔切此兩者同此兩者謂道與德同者道卽德德卽道也出而異名同謂之玄玄者幽昧不可測知之意德自道中出而異其名故不謂之道而謂之德雖異其名然德與道同謂之玄則不異也玄之又玄眾妙之門眾妙謂德門謂由此而出德與道雖同謂之玄道則玄之又玄者故道迺德之所由以出也其妙之妙道也妙之合而爲一本者眾妙之妙德也妙之分而爲萬殊者右第一章此首章總言道德二字之旨張子曰由太虛有天之名由氣化有道之名老子則以太虛爲天地之所由以爲天地者而謂之道以氣化爲萬物之所得以爲萬物者而謂之德道指形而上之理不雜乎氣者而言莊子所謂常無有也德指形而下之氣中有此理者而言莊子所謂太一也故其道其德以虛無自然爲體以柔弱不盈爲用天下皆知美之爲美斯惡已皆知善之爲善斯不善已美謂美於他物以質而言也善謂善於其事以能而言也美惡善不善之名相因而有以有惡故有美以有不善故有善皆知此之爲美則彼爲惡矣皆知此之爲善則彼爲不善矣欲二者皆冺於無必不知美者之爲美善者之爲善則亦無惡無不善也故有無相生難易相成長短相形高下相傾音聲相和前後相隨物之有無事之難易形之長短勢之高下音之闢翕聲之淸濁位之前後兩相對待一有則俱有一無則俱無美惡善不善之相因亦猶是也相形謂二形相比並相傾謂一俯臨一仰視相和謂一倡一和隨猶隨風巽之隨相連屬也五者皆言其偶獨音聲不言者葢止曰闢翕淸濁則人不知其爲言音聲也言音聲則其有闢翕淸濁之相偶自可知故但指言其實而不言其偶也易以豉切和胡卧切屬之欲切是以聖人處無爲之事行不言之教事而爲則有不爲者矣惟無爲則無不爲也教而言則有不言者矣惟無言則無不言也萬物作而不辭生而不有天地亦然作謂物將生春時也辭謂言辭生謂物旣生夏時也有謂有言不辭不有此天地不言之教也夫子謂天何言哉百物生焉是也爲而不恃功成而不居爲謂物將成秋時也恃謂恃其能而有爲功成謂物旣成冬時也居謂處其功而自伐不恃不居此天地無爲之事也夫惟不居是以不去不去常存也天地不居成物之功故其功長久而不去夫音扶右第二章聖人以不事而事故其事無所爲以不教而教故其教無所言無爲不言則雖有美有善而人不知是以其美其善獨尊獨貴而無可與對若有爲之事有言之教則人皆知其爲美爲善而美與惡對善與不善對非獨尊獨貴不可名之美善矣老子一書之中凡諸章所言皆不出乎此章之意不尙賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂尙謂尊崇之貴謂寶重之見猶示也人之賢者其名可尙上之人苟尙之則民皆欲趨其名而至於爭矣貨之難得者其利可貴上之人苟貴之則民皆欲求其利而至於爲盜矣葢名利可欲者也不尙之不貴之是不示之以可欲使民之心不爭不爲盜是不亂也見賢遍切是以聖人之治虛其心實其腹弱其志强其骨四其字皆指民而言虛其心謂使民不知利之可貴而無盜心也實其腹謂民雖不貪於利然聖人陰使之足食而充實未嘗不資夫貨也弱其志謂使民不知名之可尙而無爭心也强其骨謂民雖不貪於名然聖人陰使之勉力而自强未嘗不希夫賢也夫音扶常使民無知無欲謂使民皆無所知不知名利之可欲而無欲之之心使夫知者不敢爲也謂民縱有知名利可欲者亦不敢爲爭盜之事然不敢爲則猶有欲爲之心特不敢爾爲無爲則無不治矣爲無爲謂爲爭爲盜者皆無爲之之心如此則天下無不治矣右第三章此章言聖人治天下之道而虛心實腹弱志强骨後世養生家借以爲說其說雖精非老子本旨也道冲而用之或不盈淵兮似萬物之宗冲字本作盥器之虛也或疑辭不敢必也道之體虛人之用此道者亦當虛而不盈盈則非道矣淵深不可測也宗猶宗子之宗宗者族之統道者萬物之統故曰萬物之宗似者亦不敢必之辭也冲直中切挫其銳解其紛和其光同其塵湛兮似或存挫摧也銳銛也紛糾結也解糾結者以觿取其銳也凡銳者終必鈍故先自摧其銳以解彼之紛不欲其銳也則亦終無鈍之時矣和猶平也掩抑之意同謂齊等與之不異也鏡受塵者不光凡光者終必暗故先自掩其光以同乎彼之塵不欲其光也則亦終無暗之時矣夫銳者必鈍光者必暗猶盈者之必溢道不欲盈故銳者摧之而不欲其銳光者和之而不欲其光也其銳其光二其字屬已其紛其塵二其字屬物舊解作一句一義者非此四句言道之用不盈也湛澄寂之意道之體虛故其存於此也似或存而非實有一物存於此也此一句言道之體虛也夫音扶吾不知誰之子象帝之先吾不知誰之子問辭也象帝之先答辭也子父母所生者象帝天也象言天有象帝言天之主宰也謂道果誰之子乎天先乎萬物而道又在天之先則天亦由道而生無有在道之先者矣右第四章天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗仁謂有心於愛之也芻狗縛草爲狗之形禱雨所用也旣禱則棄之無復有顧惜之意天地無心於愛物而任其自生自成聖人無心於愛民而任其自作自息故以芻狗爲喻葢聖人之心虛而無所倚著若有心於愛民則心不虛矣復符后切著直略切天地之間其猶槖籥乎虛而不屈動而愈出槖籥冶鑄所用噓風熾火之噐也爲函以周罩於外者槖也爲轄以鼓扇於内者籥也天地間猶槖籥者槖象太虛包含周徧之體籥象元氣絪緼流行之用不屈謂其動也直愈出謂其生不窮惟其槖之虛而籥之化化者常伸故其籥之動而槖之生生者曰富在天地之間者如此其在人也則惟心虛無物而氣之道路不壅故氣動有恒而虛中之生出益多多言數窮不如守中數猶速也窮謂氣乏人而多言則其氣耗損是速其匱竭也不如虛心固守其所使外物不入内神不出則其虛也無涯而所生之氣亦無涯矣中謂槖之内籥所凑之處也數音朔谷神不死是謂玄牝谷以喻虛虛則神存於中故曰谷神谷卽中之處而守之者神也不死謂元氣常生而不死也牝以喻元氣之懦弱和柔上加玄字者贊美之辭玄牝者萬物之母也莊子所謂太一者此或號之爲靈寶後天之宗玄牝之門是謂天地根門謂所由以出根謂所由以生虛無自然者天地之所由以生故曰天地根天地根者天地之始也莊子所謂常無有者此或號之爲元始先天之祖綿綿若存用之不勤綿綿謂長久不絕若猶云而也存謂神之存勤猶云勞也凡氣用之逸則有養而日增用之勤則有損而日耗言神常存於中則氣不消耗也右第五章天長地久天地所以能長且久者以其不自生故能長久天地以其氣生萬物而不自生其氣是以聖人後其身而身先外其身而身存非以其無私邪故能成其私後謂卑賤在下不求先人先謂尊高在上外謂淸靜無爲不求益生存謂長久住世無私謂後其身外其身成其私謂身先身存聖人非欲成其私也而自有身先身存之效假設眾人有心成其私者言之則爲能成其私也右第六章上善若水水善利萬物而不爭處眾人之所惡故幾於道上善謂第一等至極之善有道者之善也其若水者何也葢水之善以其灌漑浣濯有利萬物之功而不爭處高潔迺處眾人所惡卑汙之地故幾於有道者之善幾近也惡烏路切居善地心善淵與善仁言善信政善治事善能動善時彼眾人所善則居之善必得地心之善必如淵淵謂靜深與之善必親仁與謂伴侶仁謂仁人言之善必有信政之善貴其治事之善貴其能動之善貴其時時謂當其可七者之善皆擇取眾人之所好者爲善可謂之善而非上善也夫惟不爭故無尤夫惟有道者之上善不爭處上而甘於處下有似於水故人無尤之者尤謂怨咎眾人惡處下而好處上欲上人者有爭心有爭則有尤矣右第七章持而盈之不如其已揣而銳之不可長保持奉之也已止也揣捶之也此章謂道不欲盈而又以銳爲比言槃水者不可以盈盈之則易至於溢不如已之而不使盈也遂言捶錐鋒者不可以銳銳之則易至於挫而不可長保其銳矣盈之則不長保其盈亦猶是也易以豉切金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道世有金玉滿堂莫能守者何哉葢因富貴而驕自遺其咎耳是以功成名遂而身退乃合於天之道此言不可盈之也金玉謂富驕謂盈自遺謂由已所致非由乎人咎謂不能守之咎功成名遂謂貴身退謂不盈之者天之道虛而不盈故四時之序成功者去前言富後言貴而富貴二字在中間一句通貫前後惟貴廼富則富之中有貴旣貴必富則貴之中有富富貴二者相須而有故驕盈而不保其富是卽不保其貴也身退不盈而長保其貴是亦長保其富也右第八章載營魄抱一能無離乎專氣致柔能嬰兒乎滌除玄覽能無庛乎載猶加也陰魄爲營猶軍營之營陽魂爲衞猶兵衞之衞營者所以居士卒也神加陰魄魄抱陽神交媾不離則如日月之終古常存矣此出世之人能存形者也專氣於内薰蒸肌骨極其軟脆如母腹之嬰兒此出世之人能存氣者也神棲於目目有所見則神馳於外閉目藏視黑暗爲玄雖玄之中猶有所覽是猶有疵也玄中所覽亦併滌除妄見盡滅然後無疪此出世之人能存神者也離去聲愛民治國能無爲乎天門開闔能爲雌乎明白四達能無知乎愛民治國謂君國子民用仁用智神用於外未能交媾於內然身雖有事而淸靜自然形不疲勞所謂無爲也此住世之人能養形者也天門開闔謂鼻息呼吸有出有入氣分於外未能專一於内然鼻雖有息而調帖純熟氣不麄猛所謂爲雌也此住世之人能養氣者也明白四達謂目見光明周視四向目接於外未能無覽於內然目雖有見而心境兩忘無所辨識所謂無知也此住世之人能養神者也生之畜之生而不有爲而不恃長而不宰是謂玄德生之謂氣之未生者生之而有恒畜之謂氣之已生者聚之而無損生之者雖有所生而實無心於生之故曰不有畜之者雖有所爲而實無心於爲之故曰不恃如爲官長者雖宰夫民而實無心於長之故曰不宰此所以爲玄妙不可測之德也畜敕六切長知兩切夫音扶右第九章三十輻共一轂當其無有車之用埏埴以爲噐當其無有噐之用鑿戸牖以爲室當其無有室之用故有之以爲利無之以爲用輻輪之轑也轂輪之心也無空虛之處也埏和土也埴土之粘膩者爲噐謂以水和粘膩之土爲陶噐也凡室之前東戸西牖戸以出入牖以通明車載重行遠噐物所貯藏室人所寢處故有此車有此噐有此室皆所以爲天下利也故曰有之以爲利然車非轂錧空虛之處可以轉軸則不可以行地噐非中間空虛之處可以容物則不可以貯藏室非戸牖空虛之處可以出入通明則不可以寢處車以轉軸者爲用噐以容物者爲用室以出入通明者爲用皆在空虛之處故曰無之以爲用人之實腹有氣所以存身所謂爲利也虛心無物所以生氣所謂爲用也故取三物爲喻和胡卧切右第十章五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂難得之貨令人行妨凡所欲之外物皆害身者也行下孟切是以聖人爲腹不爲目故去彼取此聖人但爲實腹而養氣不爲悅目而狥物也故悉去彼在外之諸妄而獨取此在內之一眞上言目盲耳聾口爽心狂行妨五者下但言不爲目葢舉一以包其四董思靖曰前章言虛中之用此則戒其爲外邪所實然目必視耳必聽口必味形必役心必感是不可必靜惟動而未嘗離靜則雖動而不著於無乃湛然無欲矣染塵逐境皆失其正而要在於目是以始終言之夫子四勿必先曰視六根六塵眼色亦居其首也右第十一章寵辱若驚貴大患若身寵猶愛也名位之尊人以爲榮反觀之則辱也故知道者不愛而愛之者於此而驚焉謂不能忘之而以之動心也貴猶重也貨財之富人以爲大利反觀之則大患也故知道者不貴而貴之者於此而身焉身謂不能外之而以之自累也何謂寵辱辱爲下得之若驚失之若驚謂之辱者以其爲卑下而不足爲尊高也或者貪慕於未得之先一旦得之而驚焉迷戀於旣得之後一旦失之而驚焉是寵此辱而驚之者也故曰寵辱若驚何謂貴大患若身吾所以有大患者爲吾有身及吾無身吾有何患人有此身憂慮百端戰兢保持死而後免身爲大患無可奈何貨財之爲大患則身外物也棄而不有何能爲累或者不知外物之輕視之一如吾身之重惟恐喪亡其所有是貴此大患而身之者也故曰貴大患若身喪息浪切故貴以身爲天下則可以寄天下愛以身爲天下則可以託天下天子之尊四海之富皆以其身爲天下者也知道人之愛惜貴重此身不肯以之爲天下甯不有天下而不輕用其身夫惟如此乃可以寄託以天下也寄猶寄百里之命之寄託猶託六尺之孤之託舜禹有天下而不與焉所以可受唐虞之禪彼寵其辱以爲榮貴其大患以爲大利者鄙夫爾何可付之以天下哉貴以身爲天下富以身爲天下老子之意善矣而楊朱爲我之學原於此爲云僞切夫音扶與音豫右第十二章視之不見名曰夷聽之不聞名曰希搏之不得名曰微此三者不可致詰故混而爲一此章專言德迹之呈露者目視之而易見夷謂平夷夷則冺没無迹故視之不見聲之繁宻者耳聽之而易聞希謂希疏希則間闊無聲故聽之不聞形之章大者手搏之而易得微謂微茫微則杳漠無形故搏之不得夷希微三者雖欲究極言之而不可故混同無所分别而名之爲一曰夷曰希曰微曰一皆指常德而言也其上不皦其下不昧繩繩兮不可名復歸於無物是謂無狀之狀無象之象是謂惚恍其亦謂德也其上其下猶易言形而上形而下也繩繩往過來續而不絕也復反還也無物指道而言德之上道也道無名故不皦德之下物也物有形故不昧德在有無之間雖若有名而不可名反還其初則歸於無物之道莊子所謂德至同於初是也道無物也故無狀無象德有名也故可狀可象然其狀其象亦非如物之有狀有象也故曰無狀之狀無象之象似有似無故曰惚恍迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀惟其惚恍不可名故迎之於前隨之於後而皆不可見古謂在先今謂在後有謂萬物德者其源出於道其流溥於萬物故曰執古之道以御今之有古始者道也謂古先天地之所始也道紀者德也謂道散爲德如理絲之縷有條而不紊也能知此道則知此德爲道之紀也右第十三章古之善爲士者微妙玄通深不可識夫惟不可識故强爲之容士謂有道之士旁達曰通妙萬物者無所不通其妙也微而不顯其通也玄而難辯淵乎如水之深而不可測其中深不可測故强爲之模擬其外之容以示人也下文七者是巳豫兮若冬涉川猶兮若畏四隣儼兮其若客渙兮若氷之將釋㪟兮其若樸曠兮其若谷渾兮其若濁豫猶皆獸名豫象屬猶犬子也象能前知其行遲疑犬先人行尋又囘轉故遲囘不進謂之猶豫冬涉川者怯寒畏四憐者懼敵是以遲囘而不進有道者不敢爲天下先其容如此儼矜莊貌若客隨而不迎也渙解散貌若氷將釋融液而不疑滯也㪟篤厚貌樸才未成噐也曠空豁貌若谷虛而善應也渾黄濁貌若濁美惡渾同不自潔也渾胡袞切解音蟹孰能濁以靜之徐淸孰能安以動之徐生承上濁之一字而設問曰孰能濁乎濁者動之時也動繼以靜則徐徐而淸矣又因靜之一字而設問曰孰能安乎安者靜之時也靜繼以動則徐徐而生矣安謂定靜生謂活動葢惟濁故淸惟靜故動以是推之則曠者不盈而盈㪟者不噐而噐渙者不凝而凝儼者不爲主而主猶豫者不爲先而先從可知矣老子之意大率如此後章曲則全枉則直窪則盈敝則新此意也保此道者不欲盈夫惟不盈故能敝不新成盈謂完備凡物敝則缺新則成敝而缺者不盈也新而成者盈也保守此道之人不欲其盈故能敝缺不爲新成章内七容皆敝缺而不新成右第十四章致虛極守靜篤致至之而至其極處也虛謂無物外物不入乎内也極窮盡其處也守固内禦外如外城之守靜謂不動内心不出乎外也篤力不倦也萬物並作吾以觀其復作動也植物之生長動物之知覺皆動也復反還也物生由靜而動故反還其初之靜爲復植物之生氣下藏動物之定心内寂也夫物芸芸各歸其根歸根曰靜靜曰復命芸芸生長而動之貌凡植木春夏則生氣自根而上達於枝葉是曰動秋冬則生氣自上反還而下藏於根是曰靜天以此氣生而爲物者曰命復於其初生之處故曰復命復命曰常知常曰明不知常妄作凶知常容容迺公公迺王王迺天天迺道道迺久没身不殆常者久而不變之謂能知此者謂之明昧者不知此則不能守靜而妄動以害其生故曰凶容謂形著而見乎外内有養者其外貌自與人不同也公者一國之主言能保其一身之所有也王者天下之主言能兼有天地之所有也天謂與天爲一也與天爲一則道在我矣道在我則與道同其久没猶終也殆謂損夀而危其身也按殆字從歺訓危訓將訓近凡字從歺者多是死之義殆者葢危而將近於死也死者氣盡而終葢有窮匱竟盡之意没身不殆終此身而生長可保也右第十五章太上不知有之其次親之譽之其次畏之侮之信不足焉有不信焉太上猶言最上最上謂大道之世相忘於無爲民不知有其上也其次謂仁義之君民親之如父母及仁義益著則不但親之而又譽之矣又其次謂智慧之主民畏之如神明及智慧漸窮則不但畏之而又侮之矣信者大道之實也自大道之實有所不足不能如上古之時則君之於民有不以其實者焉而日趨於華於是一降則用仁義再降則用智慧也大音泰猶兮其貴言功成事遂百姓皆謂我自然此言太上不知有之之事猶兮見前章貴寶重也然如此也寶重其言不肯輕易出口如犬行之遲疑退縮葢聖人不言無爲俾民陰受其賜得以咸安其生及其功旣成事旣遂而百姓皆謂我自如此不知其爲君上之賜也大道廢有仁義智慧出有大僞上文不知有之者大道也親譽之者仁義也畏侮之者智慧也自大道一降再降已是三等智慧又變爲大僞則共有四等也然大道廢而後有仁義則其變猶稍緩智慧出而迺有大僞則其變爲甚亟四者之分與邵子所言皇帝王伯聖賢才術之等略相似六親不和有孝子國家昏亂有忠臣此言大道廢有仁義之事然與上文之意微不同葢推廣言之爾六親父子兄弟夫婦也尊卑長幼各由其道而無有不和則子之孝者迺其常分不知其爲孝也瞽叟不父嚚傲參會而後知有大舜之孝子國謂君家謂臣君臣上下各由其道而無有昏亂則臣之忠者亦其常分不知其爲忠也商紂不君姦囘羣聚而後知有三代之忠臣絕仁棄義民復孝慈絕聖棄智民利百倍絕巧棄利盜賊無有絕謂絕而不爲棄謂棄而不用聖智智慧也巧利大僞也導民以巧誘民以利以工商之術率其民如管仲治齊衞鞅治秦是也上文言世變之降以見趨末之由此言治化之復以示反本之漸絕棄帝者仁義以反於皇之大道則民復其初子孝於父父慈於子如湻古之時矣絕棄王者聖智以反於帝之仁義則民利其利比於王之時相去百倍矣絶棄霸者巧利以反於王之聖智則雖未及帝之時而思慮深遠政教修明亦無有爲盜賊者矣此三者以爲文不足故令有所屬見素抱樸少私寡欲三者仁義聖智巧利也屬與莊子屬其性乎仁義之屬同猶云附著也皇之大道實有餘文不足自皇而降漸漸趨文帝者以皇之治爲文不足於是降大道一等而附著於仁義王者以帝之治爲文不足於是降仁義一等而附著於聖智伯者以王之治爲文不足於是降聖智一等而附著於巧利三者之治各令有所附著者以文不足故爾而豈知大道之民外之相示以素内之自守以樸素者未染色之絲也樸者未斵噐之木也質而已矣奚以文爲惟其質而不文是以民雖有身而似無身其有私焉者少矣民雖有心而似無心其有欲焉者寡矣右第十六章絶學無憂爲學日益必事事而爲之有一不能不知則以爲憂矣惟絶之而不爲則無憂也唯之與阿相去幾何善之與惡相去何若以下言爲學則有憂之事唯阿皆應聲唯正順阿邪謟幾何言甚不相遠也何若言何如其相遠也學應對者唯與阿其初相去本不遠而唯則爲善阿則爲惡其究相去迺甚遠故學唯者惟恐其或流於阿此舉可憂之一事而言也人之所畏不可不畏荒兮其未央哉荒猶廣也央猶盡也畏阿之爲惡則不敢阿矣然此特一事爾凡人之所畏而不敢爲者皆不可以不畏其事甚多而未易窮盡此爲學者之所以多憂也眾人熙熙如享太牢如登春臺我獨泊然其未兆如嬰兒之未孩熙熙和樂貌泊靜也兆如龜兆之微折眾人之爲學者狥外以爲悅如享太牢而食可悅口者甚美如登春臺而觀可悅目者甚備我則泊然而靜情欲未開無端倪可見如嬰兒未能孩笑之時一不知外物之爲樂也乘乘兮若無所歸乘乘謂寄寓於物若無所歸謂不著於物眾人皆有餘我獨若遺遺失也眾人喜其所得之多我則一無所得而慊然若有失也我愚人之心也哉沌沌兮沌如渾沌之沌冥昧無所分别也作平聲讀亦與莊子愚芚之芚同謂無知也沌杜本切俗人昭昭我獨昏昏俗人察察我獨悶悶昭昭已明察察尤明昏昏已不明悶悶尤不明俗人皆以有知爲智我獨無知而愚也漂兮其若海飂兮若無所止如漂浮於海中任其所適而不知其所定向如飂飂之長風隨其所起而不知其所止息眾人皆有以我獨頑似鄙眾人皆有以者有以知其所定所止也頑謂面頑如麻痺不知痛痒者鄙謂鄙人我獨頑然無知有似遠鄙之愚民也凡民居於國邑繁庶之地者多知居於遠鄙僻陋之地者無知也我獨異於人而貴食母此一句總結上文八節自人之所畏至我獨若遺四節言人之爲學者務多能而我獨一無所能自我愚人之心至我獨頑似鄙四節言人之爲學者務多知而我獨一無所知此我之所以獨異於人而我之所貴者則大道之玄德也玄德者萬物資之以養所謂萬物之母也故曰食母食母二字見禮記内則篇卽乳母也司馬氏曰乳哺光和右第十七章
