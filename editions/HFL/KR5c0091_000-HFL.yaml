body:
  text: 臨川吴澄述老子李氏名耳字聃史記列傳曰字伯陽楚苦縣厲鄉曲仁里人周守藏室之史也脩道德以自隱無名爲務居周乆之見周之衰遂去至關關令尹喜曰子將隱矣强爲我著書於是迺著上下篇五千餘言而去莫知其終莊子曰以本爲精以末爲粗以有積爲不足澹然獨與神明居建之以常無有主之以太一以懦弱謙下爲表以空虚不毁萬物爲實人皆求福己獨曲全以深爲根以約爲紀常寬容於物不削於人古之博大眞人哉苦音怙藏去聲强爲上其兩切下云僞切
  hash: sha256:f13dfe4fc3c61e0b8fc1a07c317089dc5147780d2fe63529a30ef7ed3fbf4adf
