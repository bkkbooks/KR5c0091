  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書子部十四道徳真經註道家𩔖提要臣等謹案道徳真經註四卷元吳澄撰澄有易纂言已著録據澄年譜稱大徳十一年澄辭疾歸自京南下留清都觀與門人論及}
