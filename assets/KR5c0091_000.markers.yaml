  - {type: variant, offset: 1, length: 2, content: 子短, WYG: 莊太元等書因為正厥訛譌而著其説澄學出象山以尊徳性為本故此注所言與蘇轍指意畧同雖不免援儒入墨而就彼法言之則較諸方士之所註精䆳多矣篇末有澄䟦云莊君平所傳章七十二諸家所傳章八十}
