body:
  text: 臨川吴澄述道經下孔德之容惟道是從孔德猶言盛德容謂有而可見者從由也萬有皆本乎德凡形氣之可見者德之容也然德之所以有此容者由道中出道之爲物惟恍惟惚德自道中出而道則無也德者道所爲物而似無似有不可得而見故曰恍惚恍兮惚兮其中有物惚兮恍兮其中有象其字指德而言物者物生以後之形象者物生以前之氣德雖恍惚惚恍不可見然形之可見者成物氣之可見者成象皆德中之所有先儒謂沖漠無朕而萬有森然已具者此也窈兮㝠兮其中有精恍惚雖不可見而似無似有猶似可見窈㝠則昏昏昧昧全不見矣此道之無也其字指道而言精謂德也有物有象者德之容皆其粗也德者有物有象之本廼其精也莊子曰以德爲本以本爲精上文言物象本乎德此言德出乎道其精甚眞其中有信二其字又指德言眞謂道也信實也與眞字同義物象爲粗而德爲精其爲精者廼甚眞之道也德之中有至實之道在焉上文言道之中有德此言德之中有道蓋道即德也德即道也首章曰此兩者同自古及今其名不去以閲衆甫不去謂常存也閲猶歷也甫美也衆甫萬有也萬有之美有時變滅惟孔德由道中出者自古及今不變滅而常存故以不去二字名之以其有常而遍歷古今無常之萬有也吾何以知衆甫之然哉以此然如此也吾何以能知萬物之變滅無常如此哉以此孔德之有常者知之也右第十八章曲則全枉則直窪則盈敝則新少則得多則惑曲一偏也易禮中庸莊子所言曲字皆以偏而不全爲曲曲者不全也然能專攻其所偏致精乎此旁達乎彼舉一反三通一畢萬乆必會其全也自初即欲求全則志大心勞分而不專終不能全矣枉者不直也尺蠖之屈而枉所以能伸而直窪者不盈也科坎之陷而窪所以能受水而盈敝者不新也秋冬之凋而敝所以能逢春而新少者不多也少則多一句變文析爲二句少則易於有得所以能積累而多貪多則雜而生惑於一且無所得豈能多乎不欲直不欲盈不欲新不欲多而以曲則全一句始之四者皆不求全之推也是以聖人抱一爲天下式此一句爲一章宗㫖通貫上文下文之意一者冲虚之德也式以在車爲喻高在憑較卑則憑式聖人抱此冲虚之德濡弱謙下爲天下式如上下文五者皆冲虚之德自處於卑也較音角不自見故明不自是故彰不自伐故有功不自矜故長夫惟不爭故天下莫能與之爭自見猶云自炫明謂智之明不自見者用晦而明也自是猶云自賢彰謂名之彰不自是者闇然而日彰也誇其功曰伐功謂事之成績負其長曰能矜長謂能之過人人不自見不自是不自伐不自矜而以夫惟不爭終之四者皆不爭之餘也見賢遍切古之所謂曲則全者豈虚言哉誠全而歸之曲則全三字古有是語老子述之以爲此章首句章内抱一爲綱曲則全以下五者夫惟不爭以上五者凡十事爲目皆曲則全一語所可詠也故重述於章末而曰古人所謂曲則全者豈虚爲此言而無其實哉蓋之其誠實能全而遂以全之效歸之也右第十九章希言自然聽之不聞曰希希言無言也得道者忘言因其自然而已飄風不終朝驟雨不終日孰爲此者天地天地尚不能乆而況於人乎飄狂疾也驟急暴也自旦至食時爲終朝自旦至暮時爲終日不因其自然而輕躁發言譬如天地之飄風驟雨皆反自然之常而爲怪變者也天地反自然之常其爲怪變尚不能乆不及終朝終日而止況人而不因自然可乎故從事於道者道者同於道德者同於德失者同於失從事於道謂以道爲事也道者有道之人德者有德之人失者庸下之人所爲不能無失者也同與莊子齊物論之齊相近謂與之合一不相非異也惟因其自然而希言故凡上等次等下等之人皆視之一同而無非異蓋道者德者與我爲一無所容言矣至若失者他人雖以爲失彼則自以爲是固亦有自然之是也豈可不因其所是以是之而廼妄言以非之哉莊子曰不言則齊齊與言不齊言與齊不齊也故無言亦老子希言自然而玄同之意齊與言與音余同於道者道亦得之同於德者德亦得之同於失者失亦得之信不足焉有不信焉道德之人以我同之印證參同夫何間然失者之人以我同之亦或縁彼之獨是而悟我之公是則三者之人皆以我同之而有得也然此惟有道之人者能之苟道之實有所不足於己則其待人也必有不以道之實者焉而是是非非强加分别矣豈能如此玄同也哉跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其於道也曰餘食贅行物或惡之故有道者不處也又以人之行立譬前事立與行亦因其自然或於自然之外而求益跂立超其踵而立以增高其身跨開其足而行以增闊其歩暫時如此而不能乆也終必不可以立不可以行而遂廢彼自見者之終不能明自是者之終不能彰自伐者之終無其功自矜者之終無所長亦若此焉爾食之不盡者曰餘肉之附生者曰贅物兼人與鬼神而言自見自是自伐自矜之人若律之於自然之道譬若食之已餘者不當食行之如贅者不當行也加多於常分而不可用幽顯之間有物亦當惡之而有道之人不肯以此自處也或曰行讀如形古字通用司馬氏曰棄餘之食適使人惡附贅之形適使人醜蘇氏曰飲食有餘則病四體有贅則累右第二十章此章自然二字爲宗㫖希言而玄同自然者也風之飄雨之驟立之跂行之跨食之餘行之贅非自然者也有物混成先天地生前章道之爲物物謂德也此章有物混成物謂道也混渾通混成謂不分判而完全也先天地生首章所謂天地之始四章所謂象帝之先也寂兮寥兮獨立而不改周行而不殆可以爲天下母寂闃靜也寥虚廓也言其無聲無形也獨立乎萬物之表無可與對而未嘗變易故曰不改周行乎萬物之中無不徧及而未嘗窮匱故曰不殆天下母者德也而德者道所爲故爲天下母吾不知其名字之曰道强爲之名曰大此物無可得而名者以其天地萬物之所共由於是假借道路之道以爲之字字者名之副而非名也字不足以盡之不得已而强名之曰大至大莫如天而天亦在道之内則天未爲大也此道其大無外而莫能載焉故大之一言庶乎可以名之爾大曰逝逝曰遠遠曰反逝謂流行不息遠謂悠乆無疆反謂無有無名蓋萬有皆有惟道皆無無與有相反故曰反大之一言未足以盡道故推言之謂其大而不息不息而乆乆而無有所以爲道若有則非道矣下篇曰反者道之動天下萬物生於有有生於無莊子曰太初有無無有無名蓋謂此也故道大天大地大王亦大域中有四大而王居其一焉王謂聖人之有位者古今惟道最大無可與比此以天地聖人與道並言而曰四大何也蓋天地得此道以爲天地聖人得此道以爲聖人其所以能大者以其有此道也王之下特加亦字又特言王居其一蓋氣之至大者天形之至大者地聖人之身眇然而立乎兩間以其道同乎天地故其大亦同乎天地而不以氣形與身之大小論也人法地地法天天法道道法自然人者聖人也法者水平之準與之平等如一也人之所以大以其得此道而與地一故曰法地地之所以大以其得此道而與天一故曰法天天之所以大以其與道一故曰法道道之所以大以其自然故曰法自然非道之外别有自然也自然者無有無名是也右第二十一章重爲輕根靜爲噪君根本也躁動也君主也輕以重爲本動以靜爲主也是以君子終日行不離輜重君子吉行乘乘車師行乘兵車皆輕車也輕車後有輜車載寢處服食所用之物謂之重車雖乘輕車而終日不與重車相離故吉行日止五十里師行日三十里不敢以輕車疾行徑往而不顧在後之輜重也此言輕之本乎重也雖有榮觀燕處超然燕閑也靜也處居也坐也雖有榮華之境可以遊觀或暫時動而出外然常在内閑居靜處超然無一物累其心此言動之主乎靜也奈何萬乘之主而以身輕天下以身輕天下謂以其身輕動於天下之上也萬乘之主當靜重奈何以其身而輕動乎周王之乘八駿漢帝之爲微行以身輕天下者也但言輕不言動者蓋動與靜對動則有輕有重輕與重對輕重皆在動時言輕而動在其中矣輕則失根噪則失君有輕而無重則失其輕之根有動而無靜則失其躁之君右第二十二章此章以輜車喻重燕處喻靜姑指一端而言爾國勢之居重馭輕兵法之以靜制動與夫人之治心治身皆當本之以重主之以靜也善行無轍迹善言無瑕謫善計不用籌策善閉無關鍵而不可開善結無繩約而不可解善謂善於其事轍車轍迹足迹瑕玼玷謫過責計計數多寡也籌策計筭者所用之筭以竹爲之關鍵拒門木也横曰關竪曰鍵繩約索也合之而成體曰繩用之而束物曰約行者必有轍迹在地言者必有瑕謫可指計數者必用籌策閉門者必用關鍵結繫者必用繩約然皆常人所爲爾有道者觀之則豈謂之善哉善行者以不行爲行故無轍迹善言者以不言爲言故無瑕謫善計者以不計爲計故不用籌策善閉者以不閉爲閉故無關鍵而其閉自不可開善結者以不結爲結故無繩約而其結自不可解舉五事爲譬以超下文聖人善救之意是以聖人常善救人故無棄人常善救物故無棄物是謂襲明聖人之救人救物以不救爲救亦若上文所譬以不爲其事爲善也蓋有所救者必有所棄假使所救者百千萬人百千萬物然此百千萬之外皆棄而不及救者也聖人之善於救者不然一皆無所救無所救則亦無所棄矣不見其爲救此而棄彼也故無一人是棄而不救之人無一物是棄而不救之物襲者如以外衣掩蔽其内衣儻救人救物之功彰彰而明天下皆見其救之不謂之善救矣必使無救之之迹掩蔽其所可見而衆莫能知故曰襲明善救人善救物與善行善言善計善閉善結凡七善字有道者謂之善世俗不知其善也蓋世俗以能爲其事爲善有迹可見有名可稱而與不善爲對有道者以不爲其事爲善泯然無迹渾然無名而無與爲對者也若世俗所謂善不善如下文所云故善人不善人之師不善人善人之資善人謂善於其事之人不善人謂不善於其事之人師者人所尊事以爲法者資者如以財貨給人俾人籍之賴之而得以有所成者彼善而此不善以彼之善與此之不善者相遼而人灼見此之不及彼則彼人之善可爲此不善人之師矣彼不善而此善以彼之不善與此之善者相形而人遂見此之過於彼則彼人之不善廼爲此善人之資也謂因彼之不善以成此之善名故曰資然善不善之名對立豈有道之世哉下文言有道者欲使世之人不以善名亦不以不善名也不貴其師不愛其資雖知大迷是謂要妙愛猶云喜好也要猶云至極也妙者玄不可測使不善者之遇善人雖可以爲己之師而不貴重之也蓋不欲名斯人之爲善也使善者之遇不善人雖得以爲己之資而不喜好之也蓋不欲名斯人之爲不善也善不善之名俱泯一概玄同無可分别雖有智者亦大迷而不知其孰爲善孰爲不善斯廼妙不可測之至極曰要妙右第二十三章前二節言聖人不可名之善後二節言常人兩可名之善不善其不彰不可名之名者謂之襲明其不分兩可名之名者謂之要妙知其白守其黑爲天下式爲天下式常德不忒復歸於無極白謂光明黑謂塵暗無極謂無所窮盡知其雄守其雌爲天下谿爲天下谿常德不離復歸於嬰兒雄謂剛强雌謂柔弱嬰兒謂無所識知知其榮守其辱爲天下谷爲天下谷常德廼足復歸於樸榮謂尊貴辱謂卑賤樸謂木質未斲爲器此章之意欲自常德而反本復始以歸于太初之道常德者冲虚不盈之德故寧黑毋白寧雌毋雄寧辱毋榮知其守其者雖知彼之可尚然寧守此而自處於下乘車之式流水之谿谷皆謂自處於下也如是則於常德不差忒不相離而德足乎己矣既全此冲虚之德廼可復歸於太初之道莊子所謂德至同於初也曰無極曰嬰兒曰樸皆以喻太初之道樸散則爲器聖人用之則爲官長故大制不割木樸之未散也抱其天質之全及破碎其全則散之而爲所斲之器聖人之未用也藴其内德之體及發露其體則用之而爲各官之長官天下之長者天子也官一國之長者諸侯也上三節皆欲自末而本此二句則言自本而末者然樸雖已散而猶欲復歸其全則已散如未散聖人雖已用而猶欲復歸其全則已用如未用蓋以不散爲散不用爲用也凡有所裁制者必須以刀割裂其全而大制則以不制爲制故不割裂也大散不散大用不用亦如大制者不割也右第二十四章將欲取天下而爲之吾見其不得已取天下謂使天下悦而歸己也爲謂作爲取天下者德盛而人自歸之爾苟若有所作爲則是欲用智力以强服天下豈能得天下之歸己哉天下神器不可爲也爲者敗之執者失之天下者至大之器有神司之不可以智力有爲而得敗謂不成也彼以智力爲之者欲成其事而其事反不成謂不能得天下之歸服也故曰爲者敗之未得天下而取天下者固不可以有爲而得既得天下而守天下者亦不可以有心而留譬如寳器若常執之在手不須臾舍惟恐其或失者反不能保其不隕隊而失也故曰執者失之凡物或行或隨或呴或吹或强或羸或載或隳是以聖人去甚去奢去泰此承上文執者失之一句而言守天下之道有天下者豈能保天下之長爲我有而不亡也哉蓋得失存亡之相襌如行隨呴吹强羸載隳八者之相反而相因聖人知其勢之必至於此也而處之有其道焉凡過盛必衰衰則亡之漸也惟不使之過盛則可以不衰而又何有於亡甚也奢也泰也極盛之時也去甚者欲其常如微之時去奢者欲其常如儉之時去泰者欲其常如約之時能不過盛則可以保天下之不亡矣邵子謂飲酒但令其微醉而不可成酩酊看花但及其半開而不可至離披蓋此意也蘇氏曰或行於前或隨於後或呴而暖或吹而寒或强而益或羸而損或載而成或隳而毁皆物之自然勢之不免者也愚人私己而務得廼欲拒而違之其禍不覆則折惟聖人知其不可逆則順以待之去其甚去其奢去其泰使不至於過而天下無患矣董思靖曰聖人知事勢之相因亦理之常故任之自然而不使之盈且過也右第二十五章以道佐人主者不以兵强天下其事好還王氏曰以道佐人主尚不可以兵强天下况人主躬於道者乎蘇氏曰聖人用兵皆出不得已非不得已而欲以强勝天下雖或能勝其禍必還報之楚靈齊湣秦皇漢武或以殺其身或禍其子孫人之所毒鬼之所疾未有得免者也師之所處荆棘生焉大軍之後必有凶年政和註曰下奪民力故荆棘生上違天時故有凶年蘇氏曰兵之所在民事廢田不修用兵之後殺氣勝年穀傷凡兵皆然况以兵强天下邪善者果而己不敢以取强果而勿矜果而勿伐果而勿驕果而不得已是謂果而勿强兵之善者果决於一時以定亂而已不敢阻兵弗戰以取勝而爲强也蘇氏曰勿矜勿伐勿驕不得已四者所以爲勿强也物壯則老是謂不道不道早已有道者常如嬰兒孺子故能不老而長年若壯則必老此不道者也不道者早已言其不能乆也蘇氏曰壯之必老物無不然惟有道者成而若缺盈而若冲未嘗壯故未嘗老未嘗死以兵强天下壯亦其矣能無老乎夫佳兵者不祥物或惡之故有道者不處也佳猶云嘉之也不祥謂無吉慶而有凶災也不處謂不肯以此處身也君子居則貴左用兵則貴右此指言不處之實不處平日所貴之位而處所不貴之位不肯於用兵之位處身也兵者不祥之器非君子之器不得己而用之恬淡爲上勝而不美謂其殺人廼凶災之器非吉慶人所用之器也恬者不歡愉淡者不濃厚謂非其心之所喜好也爲上謂不好用兵廼爲可尚也勝而不美謂兵雖得勝亦不肯以爲美事美之者是樂殺人也樂殺人者不可以得志於天下矣此推言不美若以戰勝爲美事是以殺人爲樂也不可以得志於天下要終而言之以示戒吉事尚左凶事尚右偏將軍處左上將軍處右此又申言上文不處之意殺人衆多以悲哀泣之戰勝以喪禮主之此又申言上文不美之意右第二十六章道常無名此言道也樸雖小天下不敢臣侯王若能守萬物將自賔樸指道言道彌滿六合而歛之不盈一握故曰小至尊者道故人之體此道者可以君天下而天下不敢臣之侯謂一國之君王謂天下之君若能守此道則萬物尊之爲主而將自賔矣自者非我欲其如此而彼自如此也天地相合以降甘露人莫之令而自均道之功普遍於天下譬如天地之氣相合而降爲甘露雖無人使令之而自能均及於萬物萬物生畜於此道之中故有道者可以爲萬物之主而萬物咸賔焉蘇氏曰甘露被於萬物無不均徧聖人體道以應諸有亦如露之無不及者故能賔萬物也始制有名此言德也始者道也制制作也猶言爲也有名者德也道無名自道而爲德則有名也名亦既有夫亦將知止知止所以不殆道之無名而爲德則名亦既有矣故人之用此德者當知止於德不可再降而下也將猶晋人將無同之將辭之不迫者也老子以道爲上德言在德之上以仁爲下德言在德之下也又言失道而後德失德而後仁失仁而後義失義而後禮故專言道德而搥提仁義蓋以仁義下於德也此章言德而曰夫亦將知止其意若曰自無適有當知至於德而止不可再適也德之有名已下於道復下於德可乎知止於德則猶未遠於道也不殆不窮匱也謂可長乆不敝壞也蘇氏曰聖人豈徇名而忘樸逐末而喪本哉是以乘萬變而不殆也譬道之在天下猶川谷之與江海上文言自無而有當止於德此又言自有而無當復於道蓋道之在天下猶江海爲衆流之所歸德者猶谿谷之衆流德而復歸於道則猶谿谷之會同于江海右第二十七章知人者智自知者明勝人者有力自勝者强智能知人徇外之智爾能自知則内能盡性也故謂之明有力能勝人恃外之力爾能自勝則内能克己也故謂之强知足者富强行者有志能盡性而又能達於命則無所歆羡而常有餘惟明者能之能克己而又能勇於善則有所秉持而常無怠惟强者能之不失其所者乆死而不亡者壽惟明惟强則見眞守固逮至查滓消融功用純熟思爲俱泯神化脗合住世之時各隨所在而此心不失始終如一故謂之乆厭世之後雖去其宅而此心常存古今不二故謂之壽右第二十八章或曰老子之道以昧爲明以弱爲强而此章言明言强何也曰老子内非不明外若昧爾内非不强外示弱爾其昧其弱治外之藥其明其强治内之方並行而不相悖也大道汎兮其可左右汎廣也謂如水之汎濫洋溢道之廣無所不在或左或右隨處而有取之左右無所不可也萬物恃之以生而不辭功成而不居恃賴也生謂春生之始萬物賴道以生而道則無言前章云萬物作而不辭是也功成謂冬藏之宰物之功既成而道不居其功也衣被萬物而不爲主常無欲可名於小矣此申言萬物恃之以生而不辭春生之時道普徧萬物如以衣衣之以被被之所謂元亨播羣品元亨誠之通而道不自爲之主常無欲謂其無心也此一本之散爲萬殊廼道之分而至小者其可名之於小矣乎蓋不可也若其可名則非不辭不爲主常無欲之道矣衣去聲萬物歸焉而不知主可名於大矣此申言功成而不居冬藏之時萬物反本復命會歸于一所謂利貞固靈根利貞誠之復而物亦不知其孰主之此萬殊之合爲一本廼道之總而至大者其可名之於大矣乎蓋不可也若其可名則非不居功不知主之道矣或疑不知主之下脱常無名三字可名於小矣可名於大矣二句蓋設爲疑問之辭而不質言也句末雖無乎字而有乎字之意如前章能無離乎能嬰兒乎能無疵乎能無爲乎能爲雌乎能無知乎一本無六乎字而解者必以有乎字之意釋之此其例也又如大雅詩曰有周豈不顯乎帝命豈不時乎而詩文但曰有周不顯帝命不時亦其類也是以聖人能成其大也以其不自大故能成其大此章言天地之道結語乃言聖人蓋聖人與天地一也歲功成而萬物歸道之至大也而天地不居其功萬物不知所主是天地之道雖大而不自以爲大聖人亦若此矣是以能成其大也亦以其道大而不自以爲大故能成其大焉爾右第二十九章執大象天下往往而不害安平泰執謂體之而不違大象喻道也下篇云大象無形道隱無名往歸往也不害謂利言體道之聖人爲天下之人所歸往民既歸往而聖人以不利利之蓋利之以利則有利亦有害利之以不利則常利而不害則民得以常安常平常泰也政和註曰安則無危平則無詖泰者通治樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既既盡也言外物之可利者皆不能乆惟道之利人以不利爲利故能乆也樂者歌吹舞蹈之聲容餌者飲食之味饗燕之禮設樂設餌以悦樂賔客然客既過去則其聲容與味亦止而無復有可爲暫焉之悦樂而不能以終日也道則非如餌之可飲食非如樂之有聲容可視聽也然用之則能常安常平常泰而無可盡之時非如樂餌暫焉悦樂而已故曰用之不可既右第三十章將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明歙闔也張開也老子謂反者道之動又謂玄德深矣遠矣與物反矣故其所爲大槩欲與人之所見相反而使人不可測知故借此八者相及之四事設譬而歸宿在下文柔勝剛弱勝强六字亦猶前章言善救人善救物而章首先借善行善言善計善閉善結五者爲譬也孫吴申韓之徒用其權術陷人於死而人不知論者以爲皆原於老氏之意固其立言之不能無弊有以啓之而遂謂天下誰敢受老氏之與者哉則因其言而并疑其心亦過矣註者又欲諱護而爲遁辭蓋胥失之視不可見曰微微明者微其明也謂匿其可見者而使之不可見猶前章言襲明也人但見其張之强之興之與之而不知其欲歙之弱之廢之奪之也故曰微明歙音翕柔勝剛弱勝强彼剛而我欲以剛勝之彼强而我欲以强勝之不亦難乎我以柔弱自處則剛强者不我忌也而終於能勝之何哉蓋與之相反而使之不可測知故也蘇氏曰天下之剛强方相傾乹而吾獨柔弱以待之及其大者傷小者死而吾以不校坐待其斃此所以勝也然聖人豈有意爲此以待勝物哉知勢之自然而居其自然爾魚不可脱於淵國之利器不可以示人魚脱於淵見其易制而爲人所取國之利器以示人人見其爲利且將效之或求過之而我之利者不足以爲利矣不脱於淵不以示人則不可測知所謂微明也右第三十一章此章主意在第二節柔勝剛弱勝强六字其第一節謂欲與人相反也第三節謂欲使人不可測知也道常無爲而無不爲道之無爲乆而不變非特暫焉而已故曰常無爲雖一無所爲而於所當爲之事無一不爲也若無爲而事有廢缺則亦何取其無爲也哉此之無爲蓋性焉安焉者也侯王若能守萬物將自化侯王若能守此無爲之道則雖無心於化物而物將自化化而欲作吾將鎮之以無名之樸無名之樸亦將不欲欲謂有心爲之作猶起也言未能純乎無爲之道者方將待物之化而遽有心於欲其化欲之之心一起則非無爲之道矣吾欲作者之自吾也鎮謂壓定使之不起無名之樸謂此無爲之道也欲作之時必將以此無名之樸鎮壓其有心之欲以道自治也既以此無名之樸鎮其欲則其欲亦將不欲矣此之不欲復焉執焉者也不欲以靜天下將自正靜者作之反其始也欲作既以道鎮之則欲者不欲而作者靜矣故雖無心於正天下而天下將自正其與萬物將自化者亦無以異或安而行之或利而行之及其成功一也右第三十二章此章前二節言無爲而民自化後二節言好靜而民自正道德眞經註卷之二
